<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Array Methods</title>
</head>

<body>

    <h1>Array Sort Method</h1>
    <p id="demo1"></p>
    <p id="demo2"></p>

    <script>

        let arr = [12, 7, 99, 2, 16, 1, 90]

        let sortedArrAsc = arr.sort((a, b) => {
            return a - b
        })

        let sortedArrDesc = arr.sort((a, b) => {
            return b - a
        })

        document.getElementById("demo1").innerHTML = sortedArrAsc;
        document.getElementById("demo1").innerHTML = sortedArrDesc;


    </script>

</body>

</html>
