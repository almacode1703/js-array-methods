<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Map Method</title>
</head>

<body>

    <h1>Array MAP method</h1>
    <p>Original Array : 1,2,3,4,5</p>
    <p id="demo"></p>

    <script>
        let arr = [1, 2, 3, 4, 5]
        // map

        let newArr = arr.map((item) => {
            return item * item
        })

        document.getElementById("demo").innerHTML = "Squared Array : " + newArr

    </script>

</body>

</html>
